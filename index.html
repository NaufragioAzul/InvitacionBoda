<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="invitation-card">
        <!-- Foto de portada -->
        <div class="photo-container">
            <img src="tu-foto-de-boda.jpg" alt="Nosotros" class="wedding-photo">
        </div>

        <!-- Información del evento -->
        <section class="details">
            <h1>¡Nos Casamos!</h1>
            <h2>Ana & Carlos</h2>
            <hr class="divider">
            <p class="date">Sábado, 17 de Octubre de 2026</p>
            <p class="time">18:00 Horas</p>
            <p class="place">Quinta Las Flores, Ciudad de México</p>
        </section>

        <!-- Confirmación de asistencia -->
        <section class="rsvp">
            <h3>Confirmar Asistencia</h3>
            <button id="rsvp-btn" onclick="confirmarAsistencia()">¡Sí, asistiré!</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
